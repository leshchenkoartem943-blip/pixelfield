<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Pixel Field</title>
    <link rel="stylesheet" href="/webapp/static/style.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>

    <div id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Pixel Field</div>
    </div>

    <div id="topbar">
      <div class="title">PF</div>
      <div id="stats" class="stats">...</div>
      <button id="btnProfile" class="btn" title="Профиль">👤</button>
      <button id="btnShop" class="btn" title="Магазин">🛒</button>
      <button id="btnLoot" class="btn" title="Лут">📦</button>
      <button id="btnTop" class="btn" title="Топ">🏆</button>
      <button id="btnPool" class="btn btn-gold" title="Донат-пул">💎</button>
      <button id="btnRecenter" class="btn" title="К себе">⊙</button>
    </div>

    <canvas id="c"></canvas>
    <canvas id="mini"></canvas>

    <div id="overlay"></div>

    <div id="toast"></div>

    <div id="panel" class="panel hidden">
      <div class="panelHandle"></div>
      <div class="panelHeader">
        <div id="panelTitle" class="panelTitle">Панель</div>
        <button id="btnClose" class="btn">✕</button>
      </div>
      <div id="panelBody" class="panelBody"></div>
    </div>

    <script type="module" src="/webapp/static/app.js?v=20"></script>
  </body>
</html>
