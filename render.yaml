services:
  - type: web
    name: pixel-field-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./data.db
      - key: ADMIN_SECRET
        value: change_me
      - key: TELEGRAM_BOT_TOKEN_FOR_WEBAPP_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false

